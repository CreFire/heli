syntax = "proto3";

package pb;

option go_package = "game/src/proto/pb";

import "common.proto";
import "micro.proto";
import "error.proto";
import "gamer.proto";
enum DrawType {
  DRAW_NULL = 0;
  DRAW_ONE  = 1;
  DRAW_TEN  = 2;
}

message NotifyKickNTF {
}

message SystemTipsNtf {
  string tipId = 1;
  string param = 2;
}

message AuthPingREQ {
  int64 clientTime = 1;
}

message AuthPingRSP {
  int64 clientTime = 1;
  int64 serverTime = 2;
}

message HeartREQ {
  int64 CltTs = 1;
}

message HeartRSP {
  int64 CltTs = 1;
  int64 SvrTs = 2;
}

message SayHelloREQ {
  int32  id   = 1;
  string type = 2;
}

message SayHelloRSP {
  int32  id   = 1;
  string type = 2;
}

message C2SMatchJoin {
  int32 level_id    = 1;
  int32 combat_type = 2;
  repeated int32 tower_deck = 3;
}

message S2CMatchJoin {
  string room_id      = 1;
  string battle_addr  = 2;
  string battle_token = 3;
  repeated int64 player_ids = 4;
}

message NotifyLevelChangeRSP {
  int32 level = 1;
  int32 exp   = 2;
}

message NotifyFlagsRSP {
  uint64 flags = 1;
}

message PlayerInfoNTF {
  PlayerBase base = 1;
}

message PlayerSetConfigREQ {
  string name = 1;
}

message PlayerSetConfigRSP {
}

message AccountInfoRSP {
  int32               birthRecharge = 1;
  RechargeAccountInfo rechargeInfo  = 2;
}

message AccountInfoUpdateRSP {
  RechargeAccountInfo rechargeInfo = 1;
}

message RechargeAccountInfo {
  uint64 rechargeMonthTotal = 1;
  int64  rechargeUnix       = 2;
}

message MainFlagSetREQ {
  repeated FlagUnit units = 1;
}

message MainFlagSetRSP {
  repeated FlagUnit units = 1;
}

message FlagUnit {
  GAMER_FLAGS flag = 1;
  bool        open = 2;
}

message NotifyRewardsRSP {
  repeated Item items       = 1;
  repeated Item ItemsDecomp = 2;
}

message MainGmREQ {
  string cmd = 1;
}

message MainGmRSP {
}

message PackInfoNTF {
  bool              all   = 1;
  map<int32, Item> items = 2;
}

message PackChangeRSP {
  repeated Item items = 1;
}

message PackUseREQ {
  int64          instId  = 1;
  int32          confId  = 2;
  int32          num     = 3;
  repeated int32 chooses = 4;
}

message PackUseRSP {
}

message PackSaleREQ {
  repeated Item items = 1;
}

message PackSaleRSP {
}

message ShopInfoREQ {
  repeated int32 ShopTabId = 1;
  bool           All       = 2;
}

message ShopInfoRSP {
  repeated ShopInfo ShopInfoList = 1;
}

message ShopInfo {
  int32             ShopTabId = 1;
  map<int32, int32> buyCount  = 2;
}

message ShopBuyREQ {
  int32 shopTabId = 1;
  int32 goodsId   = 2;
  int32 goodsNum  = 3;
}

message ShopBuyRSP {
  map<int32, int32> buyCount  = 1;
  repeated Item     items     = 2;
  int32             shopTabId = 3;
  int32             goodsId   = 4;
}

message LotteryInfoREQ {
}

message LotteryInfoRSP {
  map<int32, LotteryRecord> record = 1;
}

message LotteryData {
  repeated int32 custom_list = 1;
}

message LotteryDrawREQ {
  int32         LotteryId = 1;
  DrawType      draw_type = 2;
  repeated Item consume   = 3;
}

message LotteryDrawRSP {
  repeated Item             draw_items = 1;
  map<int32, LotteryRecord> record     = 2;
  int32                     LotteryId  = 3;
  DrawType                  draw_type  = 4;
  repeated Item             items      = 5;
}

message ConversionItem {
  Item          source = 1;
  repeated Item target = 2;
}

message LotteryRecord {
  map<int32, int32> draw_cnt = 1;
}

message TaskInfoNTF {
  bool                 isAll         = 1;
  repeated GameTask    tasks         = 2;
  repeated int32       del           = 3;
  GamerTaskData        data          = 4;
  repeated int32       completed     = 5;
  map<int32, GameTask> tasks_map     = 6;
  map<int32, bool>     del_map       = 7;
  map<int32, bool>     completed_map = 8;
}

message TaskChangeRSP {
  repeated GameTask tasks = 1;
}

message TaskRewardREQ {
  int32 typeId   = 1;
  int32 taskId   = 2;
  bool  isOneKey = 3;
}

message TaskRewardRSP {
  repeated Item Items = 1;
}

message TaskRefreshREQ {
  int32 typeId = 1;
}

message TaskRefreshRSP {
}

message SwitchServerRSP {
  bool SwitchSuccess = 1;
}

message SwitchServerREQ {

}

message SwitchServerNTF {

}

message ActivityRewardREQ {
  int32 activity_id = 1;
  int32 ac_type     = 2;
}

message ActivityRewardRSP {
  repeated Item items = 1;
}

message AchievementInfoRSP {
  int64             gid      = 1;
  repeated int32    trophies = 2;
  map<int32, int32> chapters = 3;
}

message AchievementChangeRSP {
  repeated int32    trophies = 1;
  map<int32, int32> chapters = 2;
}

message AchievementRewardREQ {
  int32 trophyId = 1;
}

message AchievementRewardRSP {
}

message MailInfoREQ {
  int64 lastId = 1;
}

message MailInfoRSP {
  repeated MailNew mails = 1;
}

message MailInfoNTF {
  repeated MailNew mails = 1;
}

message MailReadREQ {
  repeated int64 mailIds = 1;
}

message MailReadRSP {
  repeated int64 mailIds = 1;
}

message MailPickREQ {
  repeated int64 mailIds = 1;
}

message MailPickRSP {
  repeated Item  items   = 1;
  repeated int64 mailIds = 2;
}

message MailDeleteREQ {
  repeated int64 mailIds = 1;
}

message MailDeleteRSP {
  repeated int64 mailIds = 1;
}

message HeroInfoNTF {
  bool                 all  = 1;
  map<int32, HeroCard> hero = 2;
}

message UseItemREQ {
  Item item = 1;
}

message UseItemRSP {
  repeated Item items = 1;
}

enum BattleOpType {
  BATTLE_OP_NONE         = 0;
  BATTLE_OP_BUILD_TOWER  = 1;
  BATTLE_OP_REROLL_TOWER = 2;
  BATTLE_OP_MERGE_TOWER  = 3;
  BATTLE_OP_BUY_MINER    = 4;
}

enum BattleDeltaType {
  BATTLE_DELTA_NONE                   = 0;
  BATTLE_DELTA_RESOURCE_CHANGED       = 1;
  BATTLE_DELTA_TOWER_BUILT            = 2;
  BATTLE_DELTA_TOWER_REROLLED         = 3;
  BATTLE_DELTA_TOWER_MERGED           = 4;
  BATTLE_DELTA_MINER_BOUGHT           = 5;
  BATTLE_DELTA_MINER_PRODUCED         = 6;
  BATTLE_DELTA_MONSTER_SPAWNED        = 7;
  BATTLE_DELTA_MONSTER_HP_CHANGED     = 8;
  BATTLE_DELTA_MONSTER_STATUS_CHANGED = 9;
  BATTLE_DELTA_MONSTER_DEAD           = 10;
  BATTLE_DELTA_MONSTER_ARRIVED        = 11;
  BATTLE_DELTA_MONSTER_PROGRESS_FIXED = 12;
}

enum BattleMonsterStatus {
  BATTLE_MONSTER_NONE    = 0;
  BATTLE_MONSTER_ALIVE   = 1;
  BATTLE_MONSTER_DEAD    = 2;
  BATTLE_MONSTER_ARRIVED = 3;
  BATTLE_MONSTER_PAUSED  = 4;
}

message C2SBattleJoinREQ {
  string room_id      = 1;
  string battle_token = 2;
}

message S2CBattleJoinRSP {
  errorpb.ERROR        code      = 1;
  string               message   = 2;
  string               room_id   = 3;
  int64                player_id = 4;
  S2CBattleSnapshotNTF snapshot  = 5;
}

message BattleBuildTowerOp {
  int32 grid_id = 1;
}

message BattleRerollTowerOp {
  int64 tower_id = 1;
}

message BattleMergeTowerOp {
  int64 main_tower_id     = 1;
  int64 material_tower_id = 2;
}

message BattleBuyMinerOp {
}

message BattlePlayerOp {
  BattleOpType        type         = 1;
  BattleBuildTowerOp  build_tower  = 2;
  BattleRerollTowerOp reroll_tower = 3;
  BattleMergeTowerOp  merge_tower  = 4;
  BattleBuyMinerOp    buy_miner    = 5;
}

message C2SBattleOpREQ {
  string         room_id = 1;
  string         op_id   = 2;
  BattlePlayerOp op      = 3;
}

message S2CBattleOpRSP {
  errorpb.ERROR code        = 1;
  string        message     = 2;
  string        room_id     = 3;
  string        op_id       = 4;
  int64         server_tick = 5;
  int64         tower_id    = 6;
  int64         miner_id    = 7;
}

message BattlePlayerState {
  int64                     player_id = 1;
  int64                     gold      = 2;
  int64                     mana      = 3;
  repeated BattleMinerState miners    = 4;
}

message BattleTowerState {
  int64 tower_id        = 1;
  int64 owner_player_id = 2;
  int32 tower_type      = 3;
  int32 level           = 4;
  int32 grid_id         = 5;
}

message BattleMinerState {
  int64 miner_id          = 1;
  int64 owner_player_id   = 2;
  int64 next_produce_tick = 3;
}

message BattleMonsterState {
  int64               monster_id   = 1;
  int32               monster_type = 2;
  int32               route_id     = 3;
  int64               spawn_tick   = 4;
  int64               progress     = 5;
  int64               speed        = 6;
  int64               hp           = 7;
  int64               max_hp       = 8;
  BattleMonsterStatus status       = 9;
}

message S2CBattleSnapshotNTF {
  string                      room_id     = 1;
  int64                       server_tick = 2;
  repeated BattlePlayerState  players     = 3;
  repeated BattleTowerState   towers      = 4;
  repeated BattleMonsterState monsters    = 5;
}

message BattleStateDelta {
  BattleDeltaType    type              = 1;
  int64              server_tick       = 2;
  int64              player_id         = 3;
  string             op_id             = 4;
  int64              tower_id          = 5;
  int64              material_tower_id = 6;
  int64              miner_id          = 7;
  int64              gold              = 8;
  int64              mana              = 9;
  BattleTowerState   tower             = 10;
  BattleMinerState   miner             = 11;
  BattleMonsterState monster           = 12;
}

message S2CBattleDeltaNTF {
  string                    room_id     = 1;
  int64                     server_tick = 2;
  repeated BattleStateDelta events      = 3;
}

