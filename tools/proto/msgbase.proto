syntax = "proto3";

package msgbase;

option go_package = "game/src/proto/msgbase";

import "micro.proto";
import "error.proto";

enum MsgType {
  MSG_TYPE_UNKNOWN = 0;
  MSG_TYPE_C2S_REQ = 1;
  MSG_TYPE_S2C_RES = 2;
  MSG_TYPE_RPC_REQ = 3;
  MSG_TYPE_RPC_RES = 4;
  MSG_TYPE_S2S_NTF = 5;
}

enum MsgFlags {
  MSG_FLAG_NONE     = 0;
  MSG_FLAG_ENCRYPT  = 1;
  MSG_FLAG_BROAD    = 2;
  MSG_FLAG_ACK      = 4;
  MSG_FLAG_COMPRESS = 8;
  MSG_FLAG_ROUT     = 16;
}

message MsgHead {
  int32             body_len     = 1;
  errorpb.ERROR     err_code     = 2;
  pb.MSG_ID         msg_id       = 3;
  sfixed64          gid          = 5;
  int32             seq          = 6;
  int32             ack          = 7;
  int32             flags        = 8;
  int32             msg_type     = 9;
  int32             tar_svr_id   = 11;
  int32             src_svr_id   = 12;
  sfixed64          trace_id     = 13;
  repeated sfixed64 gids         = 14;
  sfixed64          g_sess_id    = 15;
  int64             rpc_hash_key = 16;
}
