syntax = "proto3";

package pb;

option go_package = "game/src/proto/pb";
enum CMD{
  NONE   = 0;
  MAIN   = 1;
  LOGIN  = 2;
  PLAYER = 3;
  PACK   = 4;
  TASK   = 5;
  HERO   = 6;
  EQUIP  = 7;
}

enum ACT {
  option allow_alias = true;
  ACT_NONE            = 0;
  LOGIN_BY_SESSION    = 1;
  LOGIN_OUT           = 2;
  LOGIN_RECONNECT     = 3;
  LOGIN_SWITCH_SERVER = 4;

  MAIN_GM = 1;

  PACK_SUB = 1;
}

